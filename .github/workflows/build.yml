name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - feature/**
    tags:
      - 'v*.*.*'

jobs:

  build:
    name: Build the Docker image
    runs-on: ubuntu-latest

    env:
      DOCKER_BUILDKIT: 1
      METACALL_GUIX_VERSION: 1.4.0
      METACALL_GUIX_ARCH: x86_64

    steps:
      - name: Check out the repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Docker Setup BuildX
        uses: docker/setup-buildx-action@v2.0.0
        with:
          version: v0.5.1

      - name: Verify Docker BuildX Version
        run: docker buildx version
      
      - name: Create a new builder instance
        run: docker buildx create --use --name insecure-builder --buildkitd-flags '--allow-insecure-entitlement security.insecure'

      - name: Debug GITHUB_SHA
        run: echo "Current GITHUB_SHA is: ${GITHUB_SHA}"

      - name: Build the image
        run: |
          docker buildx build -t local/metacall/guix:${GITHUB_SHA} \
          --output type=image,name=local/metacall/guix:${GITHUB_SHA} \
          --allow security.insecure \
          --build-arg METACALL_GUIX_VERSION="$METACALL_GUIX_VERSION" \
          --build-arg METACALL_GUIX_ARCH="$METACALL_GUIX_ARCH" .

      - name: List all Docker images
        run: docker images

      - name: Check Docker image size
        run: |
          echo "Checking size of the built Docker image..."
          docker images local/metacall/guix:${GITHUB_SHA} --format "{{.Repository}}:{{.Tag}} - {{.Size}}"
